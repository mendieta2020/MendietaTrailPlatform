[build]
buildCommand = "pip install -r requirements.txt && python manage.py collectstatic --noinput"

[deploy]
# Runtime start: migraciones + static + servidor
# (en una sola línea porque railway.toml lo requiere así)
startCommand = "python manage.py migrate --noinput && python manage.py collectstatic --noinput && gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120 --graceful-timeout 30 --max-requests 1000 --max-requests-jitter 100 --access-logfile - --error-logfile - --log-level info"

healthcheckPath = "/healthz"
healthcheckTimeout = 90

restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3