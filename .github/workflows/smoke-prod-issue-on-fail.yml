name: Production Smoke Test - Issue on Failure

on:
  workflow_run:
    workflows: ["Production Smoke Test"]
    types:
      - completed

jobs:
  create-issue-on-failure:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion != 'success' }}
    permissions:
      issues: write
    steps:
      - name: Create Issue on Workflow Failure
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = context.payload.workflow_run.html_url;
            const runNumber = context.payload.workflow_run.run_number;
            const workflowName = context.payload.workflow_run.name;
            const conclusion = context.payload.workflow_run.conclusion;
            const branch = context.payload.workflow_run.head_branch;
            const sha = context.payload.workflow_run.head_sha;
            
            // Deduplication check: search existing issues for this run URL
            const query = `repo:${context.repo.owner}/${context.repo.repo} is:issue "${runUrl}" in:body`;
            const searchResult = await github.rest.search.issuesAndPullRequests({
              q: query,
            });
            
            if (searchResult.data.total_count > 0) {
              console.log('Issue already exists for this run URL. Skipping creation.');
              return;
            }
            
            const issueTitle = `[ALERT] [P0] Workflow Failed: ${workflowName}`;
            const issueBody = `### [ALERT] Production Smoke Test Failure [ALERT]
            
            **Workflow:** ${workflowName}
            **Conclusion:** \`${conclusion}\`
            **Branch:** \`${branch}\`
            **Commit SHA:** \`${sha}\`
            **Run URL:** [View Failed Run](${runUrl})
            
            **Expected Check:** \`https://api.quantoryn.com/healthz\` should return 200
            **Reason Code:** \`smoke_prod_failed\`
            
            **Rollback Note:** Revert \`.github/workflows/smoke-prod.yml\` if flapping.`;
            
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: issueTitle,
              body: issueBody,
            });
            
            console.log(`Created issue #${issue.data.number}`);
            
            // Fetch existing labels (pagination-safe)
            const labels = await github.paginate(github.rest.issues.listLabelsForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const existingLabels = new Set(labels.map(label => label.name.toLowerCase()));

            const requiredLabels = [
              { name: 'P0', color: 'B60205' },
              { name: 'ops', color: '0E8A16' },
              { name: 'smoke', color: 'FBCA04' }
            ];

            for (const label of requiredLabels) {
              if (!existingLabels.has(label.name.toLowerCase())) {
                console.log(`Creating missing label: ${label.name}`);
                try {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label.name,
                    color: label.color,
                  });
                } catch (error) {
                  console.log(`Failed to create label ${label.name} (it may already exist): ${error.message}`);
                }
              }
            }

            // Attempt to apply labels
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.data.number,
                labels: ['P0', 'ops', 'smoke'],
              });
              console.log('Successfully applied labels.');
            } catch (error) {
              console.log('Failed to apply labels, but issue was created successfully.');
              console.error(error);
            }
